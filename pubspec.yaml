name: jita
description: "Just In Time App — traffic-aware departure notifications"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # HTTP client for Google Routes API
  http: ^1.4.0

  # Google Places Autocomplete
  flutter_google_places_sdk: ^0.3.0

  # Background service (Android foreground service / iOS BGTask)
  flutter_background_service: ^5.0.0

  # Local push notifications
  flutter_local_notifications: ^19.0.0

  # State management
  flutter_riverpod: ^2.6.0

  # Persist active trip
  shared_preferences: ^2.5.0

  # Date/time formatting
  intl: ^0.20.0

  # Runtime permissions
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # For mocking in tests
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
